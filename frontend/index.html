    <script>
      (function () {
        try {
          var key = 'hevy_analytics_theme_mode';
          var stored = localStorage.getItem(key);
          var mode =
            stored === 'light' || stored === 'medium-dark' || stored === 'midnight-dark' || stored === 'pure-black'
              ? stored
              : 'pure-black';
          document.documentElement.dataset.theme = mode;
          document.documentElement.style.colorScheme = mode === 'light' ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
    
    <script>
      (function () {
        // GitHub Pages SPA deep-linking support.
        // If we were redirected via /404.html, restore the original URL so the app can load normally.
        try {
          var params = new URLSearchParams(window.location.search || '');
          var p = params.get('p');
          var q = params.get('q');
          var h = params.get('h');
          if (!p) return;

          params.delete('p');
          params.delete('q');
          params.delete('h');

          var rest = params.toString();
          var search = (q ? decodeURIComponent(q) : '') || (rest ? '?' + rest : '');
          var hash = (h ? decodeURIComponent(h) : '');
          var path = decodeURIComponent(p);

          var baseHref = document.querySelector('base')?.getAttribute('href') || '/';
          var basePath = baseHref.endsWith('/') ? baseHref : baseHref + '/';

          if (basePath !== '/' && path.indexOf(basePath) !== 0) {
            var baseNoSlash = basePath.slice(0, -1);
            path = baseNoSlash + (path.startsWith('/') ? path : '/' + path);
          }

          window.history.replaceState(null, '', path + search + hash);
        } catch (e) {
          // ignore
        }
      })();
    </script>
    
    <meta name="author" content="FitVerse">
    <meta name="robots" content="index, follow">

      /* Custom Scrollbar for a sleeker look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }
      
      /* Mobile touch improvements */
      @media (max-width: 640px) {
        * {
          -webkit-user-select: none;
          user-select: none;
          -webkit-touch-callout: none;
        }
        input, textarea, button {
          -webkit-user-select: text;
          user-select: text;
          -webkit-touch-callout: default;
        }
      }
      
      /* Smooth animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      
      .animate-in {
        animation: fadeIn 0.3s ease-out;
      }
      
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      
      .slide-in-from-top-2 {
        animation: slideIn 0.3s ease-out;
      }
      
      .slide-in-from-bottom-2 {
        animation: slideIn 0.3s ease-out reverse;
      }
      
      /* Smooth transitions for all interactive elements */
      * {
        transition-property: color, border-color, opacity, box-shadow;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 150ms;
      }
      
      /* Chart container animations */
      [class*="bg-slate-900 border"] {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      [class*="bg-slate-900 border"]:hover {

      }
      
      /* Noscript fallback styling */

        margin: 0 auto;
        padding: 40px 20px;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        line-height: 1.6;

      .noscript-content ul { margin-left: 1.5rem; margin-bottom: 1rem; }
      .noscript-content li { margin-bottom: 0.5rem; color: #94a3b8; }
    </style>
